name: Build Debian Packages (binary + source)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - codename: bullseye
            q4os_suite: q4os-4-0-cn
          - codename: bookworm
            q4os_suite: q4os-5-0-cn
          - codename: trixie
            q4os_suite: q4os-6-0-cn
          - codename: forky
            q4os_suite: q4os-7-0-cn

    container:
      image: debian:${{ matrix.codename }}

    steps:

      - name: Install base tools
        run: |
          apt-get update
          apt-get install -y \
            git build-essential devscripts debhelper \
            dh-make fakeroot lintian equivs dpkg-dev rsync

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Remove .git directory
        run: rm -rf .git
  
      # Optional: add the matching Q4OS repo, in case build-deps pull in q4os packages
      - name: Add Q4OS repository (if required)
        run: |
          echo "deb http://q4os.org/q4repo ${{ matrix.q4os_suite }} main" >> /etc/apt/sources.list || true
          apt-get update || true

      - name: Install build dependencies
        run: |
          mk-build-deps -i -r -t "apt-get -y" debian/control || true

      # -------- SOURCE PACKAGE --------
      - name: Prepare source package (orig tarball if needed)
        run: |
          PACKAGE=$(dpkg-parsechangelog --show-field Source)
          VERSION=$(dpkg-parsechangelog --show-field Version | sed 's/-.*//')

          if [ ! -f "../${PACKAGE}_${VERSION}.orig.tar.gz" ]; then
            echo "Creating orig tarball..."
            cd ..
            tar czf ${PACKAGE}_${VERSION}.orig.tar.gz \
              --exclude-vcs \
              --exclude='./*.git*' \
              $(basename $GITHUB_WORKSPACE)
          fi

      - name: Build source package
        run: |
          dpkg-buildpackage -us -uc -S

      # -------- BINARY PACKAGE --------
      - name: Build binary package
        run: |
          dpkg-buildpackage -us -uc -b

      # -------- QA --------
      - name: Run lintian
        run: |
          lintian ../*.changes || true

      # -------- ARTIFACTS --------
      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          mv ../*.deb artifacts/ 2>/dev/null || true
          mv ../*.dsc artifacts/ 2>/dev/null || true
          mv ../*.tar.* artifacts/ 2>/dev/null || true
          mv ../*.changes artifacts/ 2>/dev/null || true
          mv ../*.buildinfo artifacts/ 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: q4os-packages-${{ matrix.codename }}
          path: artifacts/*
