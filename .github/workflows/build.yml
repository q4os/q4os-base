name: Build Debian Packages (binary + source)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: debian:bullseye

    steps:
      - name: Install base tools
        run: |
          apt-get update
          apt-get install -y \
            git build-essential devscripts debhelper \
            dh-make fakeroot lintian equivs dpkg-dev

      - name: Checkout source
        uses: actions/checkout@v4

      # Optional: add Q4OS repo if needed
      - name: Add Q4OS repository (if required)
        run: |
          echo "deb http://q4os.org/debian bullseye main" >> /etc/apt/sources.list || true
          apt-get update || true

      - name: Install build dependencies
        run: |
          mk-build-deps -i -r -t "apt-get -y" debian/control || true

      # -------- SOURCE PACKAGE --------
      - name: Prepare source package (orig tarball if needed)
        run: |
          PACKAGE=$(dpkg-parsechangelog --show-field Source)
          VERSION=$(dpkg-parsechangelog --show-field Version | sed 's/-.*//')

          if [ ! -f "../${PACKAGE}_${VERSION}.orig.tar.gz" ]; then
            echo "Creating orig tarball..."
            cd ..
            tar czf ${PACKAGE}_${VERSION}.orig.tar.gz \
              --exclude-vcs \
              --exclude='./*.git*' \
              $(basename $GITHUB_WORKSPACE)
          fi

      - name: Build source package
        run: |
          dpkg-buildpackage -us -uc -S -d

      # -------- BINARY PACKAGE --------
      - name: Build binary package
        run: |
          dpkg-buildpackage -us -uc -b -d

      # -------- QA --------
      - name: Run lintian
        run: |
          lintian ../*.changes || true

      # -------- ARTIFACTS --------
      - name: Upload binary packages
        uses: actions/upload-artifact@v4
        with:
          name: deb-binary
          path: |
            ../*.deb

      - name: Upload source packages
        uses: actions/upload-artifact@v4
        with:
          name: deb-source
          path: |
            ../*.dsc
            ../*.tar.*
            ../*.changes
            ../*.buildinfo
